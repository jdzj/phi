<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AINav</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/2352309?v=4&size=40">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-card: rgba(255, 255, 255, 0.92);
            --bg-panel: rgba(255, 255, 255, 0.95);
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: rgba(226, 232, 240, 0.6);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius: 16px;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
            background-image: url('https://bing.ee123.net/dayimg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.35); 
            z-index: -1;
            backdrop-filter: blur(0px); 
        }

        .header {
            background: rgba(255, 255, 255, 0.4);
            padding: 30px 20px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(2px);
            border-bottom: 1px solid rgba(255,255,255,0.5);
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }
        .logo span { color: var(--primary); }

        .search-box {
            position: relative;
            max-width: 500px;
            margin: 0 auto 20px;
        }
        .search-input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 50px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .search-input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }
        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            cursor: pointer;
            font-size: 18px;
        }

        .tabs-container {
            max-width: 1000px;
            margin: 0 auto;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            display: inline-block;
            padding: 8px 16px;
            margin: 0 4px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sub);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255,255,255,0.5);
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .tab-btn.active {
            background: #fff;
            color: var(--primary);
            border-color: var(--primary);
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
        }
        .card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.98);
        }
        
        .card-top { display: flex; align-items: flex-start; margin-bottom: 12px; }
        .card-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700;
            flex-shrink: 0; margin-right: 14px;
        }
        .card-info { flex: 1; overflow: hidden; }
        .card-title {
            font-size: 16px; font-weight: 600; color: var(--text-main);
            text-decoration: none; display: block;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .card-desc {
            font-size: 13px; color: var(--text-sub);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; line-height: 1.4;
        }
        .card-tag {
            font-size: 11px; color: var(--primary);
            background: rgba(239, 246, 255, 0.9);
            padding: 2px 8px; border-radius: 4px;
            display: inline-block; margin-top: 8px;
            font-weight: 600;
        }
        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            white-space: nowrap;
        }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-warn { background: #fef3c7; color: #92400e; }
        .status-err { background: #fee2e2; color: #991b1b; }
        .status-pending { background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; }

        .btn-visit {
            margin-top: auto; padding-top: 15px;
            display: block; width: 100%;
            padding: 10px; text-align: center;
            background: rgba(248, 250, 252, 0.6);
            text-decoration: none; border-radius: 8px;
            font-size: 14px; font-weight: 500;
        }
        .card:hover .btn-visit { background: var(--primary); color: #fff; }

        .delete-btn {
            position: absolute; top: 10px; right: 10px;
            width: 26px; height: 26px;
            background: #fee2e2; color: #ef4444;
            border: none; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; font-size: 14px;
            z-index: 10;
        }

        .admin-panel {
            display: none; 
            background: var(--bg-panel);
            border-radius: var(--radius);
            padding: 25px; margin: 20px auto;
            max-width: 600px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .panel-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 6px; font-weight: 500; }
        .form-input, .form-select {
            width: 100%; padding: 10px;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 14px; background: rgba(255,255,255,0.9);
        }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-secondary { background: #e2e8f0; color: var(--text-main); }
        .btn-info { background: #0ea5e9; color: #fff; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .import-area {
            background: rgba(240, 253, 244, 0.8); 
            border: 1px dashed #86efac;
            border-radius: 8px; padding: 15px; text-align: center;
            margin-top: 20px;
        }
        .import-text { font-size: 13px; color: #166534; margin-bottom: 10px; }
        
        .log-box {
            margin-top: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
            text-align: left;
            border: 1px solid var(--border);
            display: none;
        }
        .log-item { margin-bottom: 4px; display: flex; align-items: flex-start; gap: 6px; }
        
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #fff; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 360px; text-align: center;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo"><span>⚡</span> AINav</div>
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="搜索工具..." onkeyup="filterSites()">
        <span class="search-icon" onclick="showLogin()">⚙️</span>
    </div>
    <div class="tabs-container" id="tabsContainer"></div>
</header>

<div class="container">
    <div id="adminPanel" class="admin-panel">
        <div class="panel-title">➕ 管理中心</div>
        
        <!-- 手动添加 -->
        <div style="background: rgba(248, 250, 252, 0.8); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
            <div class="form-group">
                <label class="form-label">网站名称</label>
                <input type="text" id="newName" class="form-input" placeholder="留空则自动获取">
            </div>
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label class="form-label">链接 URL</label>
                    <input type="url" id="newUrl" class="form-input" placeholder="https://...">
                </div>
                <div class="form-group" style="flex: 1.5;">
                    <label class="form-label">分类</label>
                    <select id="newCategory" class="form-select">
                        <option value="置顶">📌 置顶</option>
                        <option value="未分类">未分类</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" onclick="addSiteFast()">
                    快速添加
                </button>
                <button class="btn btn-info" onclick="addSiteWithCheck()" id="addCheckBtn">
                    添加并检测
                </button>
            </div>
        </div>

        <!-- 批量操作 -->
        <div class="import-area">
            <div class="import-text">📂 批量导入 (秒级完成)</div>
            <p style="font-size: 12px; color: #15803d; margin: 0 0 10px 0;">
                立即导入所有书签，不进行检测。<br>
                导入后可点击下方按钮统一检测可用性并补全描述。
            </p>
            <button class="btn btn-success" id="importBtn" onclick="document.getElementById('bookmarkFileInput').click()">
                选择书签文件
            </button>
            <input type="file" id="bookmarkFileInput" accept=".html,.htm" style="display:none" onchange="handleFileSelect(this)">
            
            <div style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px;">
                <p style="font-size: 12px; color: #64748b; margin-bottom: 8px;">
                    当前列表中有 <span id="pendingCount" style="font-weight:bold; color:var(--warning)">0</span> 个未检测网址
                </p>
                <button class="btn btn-info" id="batchCheckBtn" onclick="startBatchCheck()" disabled>
                    开始批量检测
                </button>
            </div>

            <div id="importLog" class="log-box"></div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-warning" onclick="resetData()">⚠️ 重置</button>
            <button class="btn btn-secondary" onclick="toggleAdminMode()">关闭</button>
        </div>
    </div>

    <div id="siteGrid" class="grid"></div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">管理验证</h3>
        <input type="password" id="adminPassword" class="form-input" placeholder="密码" style="margin: 20px 0; text-align: center;">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn btn-primary" style="flex: 1;" onclick="checkPassword()">登录</button>
            <button class="btn btn-secondary" style="flex: 1;" onclick="closeLogin()">取消</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "618033";
    
    const defaultSites = [
        { name: "ChatGPT", url: "https://chat.openai.com", desc: "OpenAI开发的大语言模型", category: "置顶", status: "ok" },
        { name: "Gemini", url: "https://ai.google/", desc: "Google Ai", category: "置顶", status: "ok" },
        { name: "Grok", url: "https://grok.com", desc: "马斯克旗下Ai", category: "置顶", status: "ok" },
        { name: "Midjourney", url: "https://www.midjourney.com", desc: "领先的AI绘画生成工具", category: "置顶", status: "ok" },
        { name: "GitHub Copilot", url: "https://github.com/features/copilot", desc: "您的AI结对程序员", category: "置顶", status: "ok" },
        { name: "Hugging Face", url: "https://huggingface.co", desc: "AI社区的枢纽", category: "置顶", status: "ok" },
        { name: "Perplexity", url: "https://www.perplexity.ai", desc: "AI驱动的搜索引擎", category: "置顶", status: "ok" },
        { name: "Claude", url: "https://claude.ai", desc: "Anthropic 出品的安全 AI 助手", category: "置顶", status: "ok" },
        { name: "DeepSeek", url: "https://www.deepseek.com/", desc: "深度求索大语言模型", category: "置顶", status: "ok" },
        { name: "千问", url: "https://www.qianwen.com/", desc: "阿里巴巴旗下大语言模型", category: "置顶", status: "ok" },
        { name: "Kimi", url: "https://kimi.moonshot.cn/", desc: "月之暗面开发的大语言模型", category: "置顶", status: "ok" },
        { name: "Lovart", url: "https://www.lovart.ai/", desc: "生图不错的大语言模型", category: "置顶", status: "ok" },
        { name: "元宝", url: "https://hunyuan.tencent.com/", desc: "腾讯开发的大语言模型", category: "置顶", status: "ok" },
        { name: "即梦", url: "https://jimeng.jianying.com/", desc: "剪映开发的大语言模型", category: "置顶", status: "ok" },
        { name: "Sora", url: "https://openai.com/sora", desc: "OpenAI视频生成模型", category: "置顶", status: "ok" },
        { name: "Sunoo", url: "https://suno.com", desc: "AI音乐生成", category: "置顶", status: "ok" }
    ];

    let sites = [];
    let isAdmin = false;
    let currentCategory = "全部";
    let isChecking = false; // 全局检测锁

    window.onload = function() {
        loadSites();
        renderTabs();
        renderSites();
        updatePendingCount();
        document.getElementById('adminPassword').addEventListener('keypress', e => { if(e.key==='Enter') checkPassword(); });
    };

    function loadSites() {
        const stored = localStorage.getItem('ai_nav_sites');
        sites = stored ? JSON.parse(stored) : [...defaultSites];
        if(!stored) saveSites();
    }

    function saveSites() {
        localStorage.setItem('ai_nav_sites', JSON.stringify(sites));
        renderTabs();
        renderSites();
        updatePendingCount();
    }

    function resetData() {
        if(confirm("确定重置？")) {
            localStorage.removeItem('ai_nav_sites');
            sites = [...defaultSites];
            currentCategory = "全部";
            saveSites();
            alert("已重置");
        }
    }

    function getCategories() {
        const cats = new Set(sites.map(s => s.category || "未分类"));
        return ["全部", "置顶", ...Array.from(cats).filter(c => c !== "置顶" && c !== "全部").sort()];
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        const categories = getCategories();
        container.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${cat === currentCategory ? 'active' : ''}`;
            btn.innerText = cat === "置顶" ? "📌 置顶" : cat;
            btn.onclick = () => { currentCategory = cat; renderTabs(); renderSites(); };
            container.appendChild(btn);
        });

        const select = document.getElementById('newCategory');
        const currentVal = select.value;
        let opts = '<option value="置顶">📌 置顶</option><option value="未分类">未分类</option>';
        categories.filter(c => !["全部","置顶","未分类"].includes(c)).forEach(c => opts += `<option value="${c}">${c}</option>`);
        select.innerHTML = opts;
        if(currentVal && categories.includes(currentVal)) select.value = currentVal;
    }

    function renderSites(filterText = '') {
        const grid = document.getElementById('siteGrid');
        grid.innerHTML = '';
        let filtered = sites.filter(site => {
            const siteCat = site.category || "未分类";
            const matchCat = currentCategory === "全部" || siteCat === currentCategory;
            const text = (filterText || '').toLowerCase();
            const matchText = !text || site.name.toLowerCase().includes(text) || (site.desc||'').toLowerCase().includes(text);
            return matchCat && matchText;
        });

        if (currentCategory === "全部") {
            filtered.sort((a, b) => (b.category === "置顶") - (a.category === "置顶"));
        }

        if (!filtered.length) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-sub); background:rgba(255,255,255,0.6); border-radius:16px;">暂无内容</div>`;
            return;
        }

        filtered.forEach(site => {
            const idx = sites.indexOf(site);
            const initial = site.name.trim().charAt(0).toUpperCase() || '?';
            
            let statusBadge = '';
            if(site.status === 'checking') {
                statusBadge = '<span class="status-badge status-pending"><span class="spinner"></span>检测中</span>';
            } else if(site.status === 'ok') {
                statusBadge = '<span class="status-badge status-ok">可用</span>';
            } else if(site.status === 'warn') {
                statusBadge = '<span class="status-badge status-warn">存疑</span>';
            } else if(site.status === 'err') {
                statusBadge = '<span class="status-badge status-err">不可达</span>';
            } else {
                statusBadge = '<span class="status-badge status-pending">未检测</span>';
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="delete-btn" onclick="deleteSite(${idx})" ${isAdmin?'style="display:flex"':''}>×</button>
                <div class="card-top">
                    <div class="card-icon">${initial}</div>
                    <div class="card-info">
                        <a href="${site.url}" target="_blank" class="card-title">${site.name} ${statusBadge}</a>
                        <div class="card-desc">${site.desc || '暂无描述'}</div>
                        ${currentCategory==="全部" && site.category!=="置顶" ? `<span class="card-tag">${site.category}</span>` : ''}
                    </div>
                </div>
                <a href="${site.url}" target="_blank" class="btn-visit">立即访问 →</a>
            `;
            grid.appendChild(card);
        });
    }

    function filterSites() { renderSites(document.getElementById('searchInput').value); }
    
    function updatePendingCount() {
        const count = sites.filter(s => !s.status || s.status === 'pending').length;
        document.getElementById('pendingCount').innerText = count;
        document.getElementById('batchCheckBtn').disabled = (count === 0) || isChecking;
        if(isChecking) {
            document.getElementById('batchCheckBtn').innerHTML = '<span class="spinner"></span> 检测进行中...';
        } else {
            document.getElementById('batchCheckBtn').innerText = '开始批量检测';
        }
    }

    // === 管理逻辑 ===
    function showLogin() { isAdmin ? toggleAdminMode() : (document.getElementById('loginModal').style.display='flex'); }
    function closeLogin() { document.getElementById('loginModal').style.display='none'; document.getElementById('adminPassword').value=''; }
    function checkPassword() {
        if(document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
            isAdmin = true; closeLogin();
            document.getElementById('adminPanel').style.display='block';
            renderTabs(); renderSites();
            updatePendingCount();
        } else alert("密码错误");
    }
    function toggleAdminMode() {
        const p = document.getElementById('adminPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
        if(p.style.display==='none') { isAdmin=false; renderSites(); }
    }
    function deleteSite(i) { if(confirm("确定删除?")) { sites.splice(i,1); saveSites(); } }

    // === 核心逻辑：快速添加 vs 检测添加 ===

    function isInternal(url) {
        try {
            const hostname = new URL(url).hostname;
            if(hostname === 'localhost' || hostname === '127.0.0.1') return true;
            const ipRegex = /^(10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.|0\.0\.0\.0)/;
            return ipRegex.test(hostname);
        } catch(e) { return false; }
    }

    async function fetchSiteInfo(url) {
        if(isInternal(url)) {
            return { name: "内网服务", desc: "本地链接", status: 'ok' };
        }
        try {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            // 设置超时
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000); // 5秒超时
            
            const response = await fetch(proxyUrl, { signal: controller.signal });
            clearTimeout(timeoutId);
            const data = await response.json();
            
            if(!data.contents) throw new Error("No content");
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, "text/html");
            
            const title = doc.querySelector('title');
            const metaDesc = doc.querySelector('meta[name="description"]');
            
            return {
                name: title ? title.textContent.trim() : new URL(url).hostname,
                desc: metaDesc ? metaDesc.content.trim() : "自动获取的描述",
                status: 'ok'
            };
        } catch (e) {
            return {
                name: new URL(url).hostname,
                desc: "无法获取描述 (可能网络受限)",
                status: 'warn'
            };
        }
    }

    // 1. 快速添加 (无检测)
    function addSiteFast() {
        const nameIn = document.getElementById('newName').value.trim();
        const urlIn = document.getElementById('newUrl').value.trim();
        const catIn = document.getElementById('newCategory').value;

        if(!urlIn) { alert("请输入网址"); return; }
        let finalUrl = urlIn.startsWith('http') ? urlIn : 'https://' + urlIn;
        if(sites.some(s => s.url === finalUrl)) { alert("已存在"); return; }

        sites.unshift({
            name: nameIn || new URL(finalUrl).hostname,
            url: finalUrl,
            desc: "", 
            category: catIn,
            status: 'pending' // 标记为未检测
        });
        saveSites();
        document.getElementById('newName').value = '';
        document.getElementById('newUrl').value = '';
        // 不弹窗，体验更流畅
    }

    // 2. 添加并检测 (单个)
    async function addSiteWithCheck() {
        const nameIn = document.getElementById('newName').value.trim();
        const urlIn = document.getElementById('newUrl').value.trim();
        const catIn = document.getElementById('newCategory').value;
        const btn = document.getElementById('addCheckBtn');

        if(!urlIn) { alert("请输入网址"); return; }
        let finalUrl = urlIn.startsWith('http') ? urlIn : 'https://' + urlIn;
        if(sites.some(s => s.url === finalUrl)) { alert("已存在"); return; }

        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "检测中...";

        // 先占位
        const tempSite = {
            name: nameIn || "检测中...",
            url: finalUrl,
            desc: "",
            category: catIn,
            status: 'checking'
        };
        sites.unshift(tempSite);
        renderSites(); // 刷新显示 loading 状态

        const info = await fetchSiteInfo(finalUrl);
        
        // 更新数据
        const idx = sites.findIndex(s => s.url === finalUrl);
        if(idx !== -1) {
            sites[idx].name = nameIn || info.name;
            sites[idx].desc = info.desc;
            sites[idx].status = info.status;
            saveSites();
        }

        btn.disabled = false;
        btn.innerText = originalText;
        document.getElementById('newName').value = '';
        document.getElementById('newUrl').value = '';
    }

    // 3. 快速导入 (无检测)
    function handleFileSelect(input) {
        const file = input.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(e.target.result, "text/html");
            const dtElements = doc.querySelectorAll('dt');
            
            let currentFolder = "未分类";
            let count = 0;
            let skip = 0;

            for(let dt of dtElements) {
                const h3 = dt.querySelector('h3');
                const a = dt.querySelector('a');

                if(h3) {
                    let fName = h3.textContent.trim() || "未分类";
                    fName = fName.replace(/[<>"/]/g, '');
                    currentFolder = ["置顶","Top","Star"].includes(fName) ? "置顶" : fName;
                    continue;
                }

                if(a) {
                    const url = a.getAttribute('href');
                    const name = a.textContent.trim();
                    if(!url || url.startsWith('#')) continue;
                    if(sites.some(s => s.url === url)) { skip++; continue; }

                    sites.unshift({
                        name: name || new URL(url).hostname,
                        url: url,
                        desc: "",
                        category: currentFolder,
                        status: 'pending' // 标记为待检测
                    });
                    count++;
                }
            }

            saveSites();
            alert(`✅ 极速导入完成!\n成功添加: ${count}\n跳过重复: ${skip}\n\n所有新网址标记为“未检测”，可在下方点击“批量检测”来补全信息。`);
            input.value = '';
            
            // 自动展开日志区提示
            const logBox = document.getElementById('importLog');
            logBox.style.display = 'block';
            logBox.innerHTML = `<div class="log-item">✅ 已导入 ${count} 个网址，状态：未检测。请点击下方按钮开始检测。</div>`;
        };
        reader.readAsText(file);
    }

    // 4. 批量检测
    async function startBatchCheck() {
        if(isChecking) return;
        isChecking = true;
        updatePendingCount();

        const logBox = document.getElementById('importLog');
        logBox.style.display = 'block';
        logBox.innerHTML = '<div class="log-item">🚀 开始批量检测...</div>';

        // 找出所有 pending 的网址
        const toCheckIndices = sites.map((s, i) => (s.status === 'pending' || !s.status) ? i : -1).filter(i => i !== -1);
        
        let processed = 0;
        const total = toCheckIndices.length;

        if(total === 0) {
            alert("没有需要检测的网址！");
            isChecking = false;
            updatePendingCount();
            return;
        }

        for(let idx of toCheckIndices) {
            const site = sites[idx];
            // 更新状态为 checking
            site.status = 'checking';
            renderSites(); // 局部刷新太慢，直接重绘整个列表可能会闪，这里简单处理
            // 优化：只更新日志
            processed++;
            logBox.innerHTML += `<div class="log-item">⏳ [${processed}/${total}] 检测 ${site.name}...</div>`;
            logBox.scrollTop = logBox.scrollHeight;

            // 执行检测
            const info = await fetchSiteInfo(site.url);
            
            // 更新数据
            if(!site.name || site.name === new URL(site.url).hostname) {
                 // 如果原名就是域名或者为空，才替换，否则保留用户自定义名（如果是导入的通常保留原书签名）
                 // 这里策略：如果导入时名字很短或是域名，就替换成标题
                 if(site.name.length < 10 || site.name.includes('.')) {
                     site.name = info.name;
                 }
            }
            site.desc = info.desc;
            site.status = info.status;
            
            // 每 5 个保存一次
            if(processed % 5 === 0) {
                localStorage.setItem('ai_nav_sites', JSON.stringify(sites));
                renderSites();
            }

            // 限制频率
            await new Promise(r => setTimeout(r, 300));
        }

        saveSites();
        logBox.innerHTML += `<div class="log-item" style="margin-top:10px; font-weight:bold; color:var(--success)">🎉 全部检测完成!</div>`;
        isChecking = false;
        updatePendingCount();
        renderSites();
    }
