<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AINav</title>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/2352309?v=4&size=40">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-card: rgba(255, 255, 255, 0.92);
            --bg-panel: rgba(255, 255, 255, 0.95);
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: rgba(226, 232, 240, 0.6);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --radius: 16px;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
            background-image: url('https://bing.ee123.net/dayimg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.35); 
            z-index: -1;
            backdrop-filter: blur(0px); 
        }

        .header {
            background: rgba(255, 255, 255, 0.7);
            padding: 30px 20px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.5);
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }
        .logo span { color: var(--primary); }

        .search-box {
            position: relative;
            max-width: 500px;
            margin: 0 auto 20px;
        }
        .search-input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 50px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .search-input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }
        .search-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sub);
            cursor: pointer;
            font-size: 18px;
        }

        .tabs-container {
            max-width: 1000px;
            margin: 0 auto;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            display: inline-block;
            padding: 8px 16px;
            margin: 0 4px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sub);
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255,255,255,0.5);
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .tab-btn.active {
            background: #fff;
            color: var(--primary);
            border-color: var(--primary);
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
        }
        .card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.98);
        }
        
        .card-top { display: flex; align-items: flex-start; margin-bottom: 12px; }
        .card-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            color: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700;
            flex-shrink: 0; margin-right: 14px;
        }
        .card-info { flex: 1; overflow: hidden; }
        .card-title {
            font-size: 16px; font-weight: 600; color: var(--text-main);
            text-decoration: none; display: block;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .card-desc {
            font-size: 13px; color: var(--text-sub);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; line-height: 1.4;
        }
        .card-tag {
            font-size: 11px; color: var(--primary);
            background: rgba(239, 246, 255, 0.9);
            padding: 2px 8px; border-radius: 4px;
            display: inline-block; margin-top: 8px;
            font-weight: 600;
        }
        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            vertical-align: middle;
        }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-warn { background: #fef3c7; color: #92400e; }
        .status-err { background: #fee2e2; color: #991b1b; }

        .btn-visit {
            margin-top: auto; padding-top: 15px;
            display: block; width: 100%;
            padding: 10px; text-align: center;
            background: rgba(248, 250, 252, 0.6);
            text-decoration: none; border-radius: 8px;
            font-size: 14px; font-weight: 500;
        }
        .card:hover .btn-visit { background: var(--primary); color: #fff; }

        .delete-btn {
            position: absolute; top: 10px; right: 10px;
            width: 26px; height: 26px;
            background: #fee2e2; color: #ef4444;
            border: none; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; font-size: 14px;
            z-index: 10;
        }

        .admin-panel {
            display: none; 
            background: var(--bg-panel);
            border-radius: var(--radius);
            padding: 25px; margin: 20px auto;
            max-width: 600px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .panel-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 6px; font-weight: 500; }
        .form-input, .form-select {
            width: 100%; padding: 10px;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 14px; background: rgba(255,255,255,0.9);
        }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-secondary { background: #e2e8f0; color: var(--text-main); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .import-area {
            background: rgba(240, 253, 244, 0.8); 
            border: 1px dashed #86efac;
            border-radius: 8px; padding: 15px; text-align: center;
            margin-top: 20px;
        }
        .import-text { font-size: 13px; color: #166534; margin-bottom: 10px; }
        
        .log-box {
            margin-top: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
            text-align: left;
            border: 1px solid var(--border);
        }
        .log-item { margin-bottom: 4px; display: flex; align-items: flex-start; gap: 6px; }
        .log-icon { font-weight: bold; }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #fff; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 360px; text-align: center;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo"><span>⚡</span> AINav</div>
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="Search..." onkeyup="filterSites()">
        <span class="search-icon" onclick="showLogin()">⚙️</span>
    </div>
    <div class="tabs-container" id="tabsContainer"></div>
</header>

<div class="container">
    <div id="adminPanel" class="admin-panel">
        <div class="panel-title">➕ 管理中心</div>
        
        <div style="background: rgba(248, 250, 252, 0.8); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
            <div class="form-group">
                <label class="form-label">网站名称</label>
                <input type="text" id="newName" class="form-input" placeholder="留空则自动获取">
            </div>
            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label class="form-label">链接 URL</label>
                    <input type="url" id="newUrl" class="form-input" placeholder="https://...">
                </div>
                <div class="form-group" style="flex: 1.5;">
                    <label class="form-label">分类</label>
                    <select id="newCategory" class="form-select">
                        <option value="置顶">📌 置顶</option>
                        <option value="未分类">未分类</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="addBtn" onclick="addSiteWithCheck()">
                <span id="addBtnText">添加并检测</span>
            </button>
        </div>

        <div class="import-area">
            <div class="import-text">📂 批量导入并自动检测</div>
            <p style="font-size: 12px; color: #15803d; margin: 0 0 10px 0;">
                支持识别文件夹分类。<br>
                <strong>内网/IP 链接</strong>将直接添加；<strong>外网链接</strong>将尝试获取标题并检测可用性。
            </p>
            <button class="btn btn-success" id="importBtn" onclick="document.getElementById('bookmarkFileInput').click()">
                选择书签文件
            </button>
            <input type="file" id="bookmarkFileInput" accept=".html,.htm" style="display:none" onchange="handleFileSelect(this)">
            
            <div id="importLog" class="log-box" style="display:none;"></div>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-warning" onclick="resetData()">⚠️ 重置</button>
            <button class="btn btn-secondary" onclick="toggleAdminMode()">关闭</button>
        </div>
    </div>

    <div id="siteGrid" class="grid"></div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">管理员验证</h3>
        <input type="password" id="adminPassword" class="form-input" placeholder="密码" style="margin: 20px 0; text-align: center;">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn btn-primary" style="flex: 1;" onclick="checkPassword()">登录</button>
            <button class="btn btn-secondary" style="flex: 1;" onclick="closeLogin()">取消</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "618033";
    
    const defaultSites = [
        { name: "ChatGPT", url: "https://chat.openai.com", desc: "OpenAI 开发的强大语言模型", category: "置顶" },
        { name: "Gemini", url: "https://ai.google/", desc: "Google Ai", category: "置顶" },
        { name: "Grok", url: "https://grok.com", desc: "马斯克旗下 Ai", category: "置顶" },
        { name: "Midjourney", url: "https://www.midjourney.com", desc: "领先的 AI 绘画生成工具", category: "置顶" },
        { name: "GitHub Copilot", url: "https://github.com/features/copilot", desc: "您的 AI 结对程序员", category: "置顶" },
        { name: "Hugging Face", url: "https://huggingface.co", desc: "AI 社区的枢纽", category: "置顶" },
        { name: "Perplexity", url: "https://www.perplexity.ai", desc: "AI 驱动的搜索引擎", category: "置顶" },
        { name: "Claude", url: "https://claude.ai", desc: "Anthropic 出品的安全 AI 助手", category: "置顶" },
        { name: "DeepSeek", url: "https://www.deepseek.com/", desc: "深度求索大语言模型", category: "置顶" },
        { name: "通义千问", url: "https://www.qianwen.com/", desc: "阿里巴巴旗下大语言模型", category: "置顶" },
        { name: "Kimi", url: "https://kimi.moonshot.cn/", desc: "月之暗面开发的强大语言模型", category: "置顶" },
        { name: "Lovart", url: "https://www.lovart.ai/", desc: "生图不错的大语言模型", category: "置顶" },
        { name: "腾讯元宝", url: "https://hunyuan.tencent.com/", desc: "腾讯开发的强大语言模型", category: "置顶" },
        { name: "即梦", url: "https://jimeng.jianying.com/", desc: "剪映开发的强大语言模型", category: "置顶" },
        { name: "Sora", url: "https://openai.com/sora", desc: "OpenAI 视频生成模型", category: "置顶" },
        { name: "Sunoo", url: "https://suno.com", desc: "AI 音乐生成", category: "置顶" }
    ];

    let sites = [];
    let isAdmin = false;
    let currentCategory = "全部";

    window.onload = function() {
        loadSites();
        renderTabs();
        renderSites();
        document.getElementById('adminPassword').addEventListener('keypress', e => { if(e.key==='Enter') checkPassword(); });
    };

    function loadSites() {
        const stored = localStorage.getItem('ai_nav_sites');
        sites = stored ? JSON.parse(stored) : [...defaultSites];
        if(!stored) saveSites();
    }

    function saveSites() {
        localStorage.setItem('ai_nav_sites', JSON.stringify(sites));
        renderTabs();
        renderSites();
    }

    function resetData() {
        if(confirm("确定重置？")) {
            localStorage.removeItem('ai_nav_sites');
            sites = [...defaultSites];
            currentCategory = "全部";
            saveSites();
            alert("已重置");
        }
    }

    function getCategories() {
        const cats = new Set(sites.map(s => s.category || "未分类"));
        return ["全部", "置顶", ...Array.from(cats).filter(c => c !== "置顶" && c !== "全部").sort()];
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        const categories = getCategories();
        container.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${cat === currentCategory ? 'active' : ''}`;
            btn.innerText = cat === "置顶" ? "📌 置顶" : cat;
            btn.onclick = () => { currentCategory = cat; renderTabs(); renderSites(); };
            container.appendChild(btn);
        });

        const select = document.getElementById('newCategory');
        const currentVal = select.value;
        let opts = '<option value="置顶">📌 置顶</option><option value="未分类">未分类</option>';
        categories.filter(c => !["全部","置顶","未分类"].includes(c)).forEach(c => opts += `<option value="${c}">${c}</option>`);
        select.innerHTML = opts;
        if(currentVal && categories.includes(currentVal)) select.value = currentVal;
    }

    function renderSites(filterText = '') {
        const grid = document.getElementById('siteGrid');
        grid.innerHTML = '';
        let filtered = sites.filter(site => {
            const siteCat = site.category || "未分类";
            const matchCat = currentCategory === "全部" || siteCat === currentCategory;
            const text = (filterText || '').toLowerCase();
            const matchText = !text || site.name.toLowerCase().includes(text) || (site.desc||'').toLowerCase().includes(text);
            return matchCat && matchText;
        });

        if (currentCategory === "全部") {
            filtered.sort((a, b) => (b.category === "置顶") - (a.category === "置顶"));
        }

        if (!filtered.length) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-sub); background:rgba(255,255,255,0.6); border-radius:16px;">暂无内容</div>`;
            return;
        }

        filtered.forEach(site => {
            const idx = sites.indexOf(site);
            const initial = site.name.trim().charAt(0).toUpperCase() || '?';
            const statusBadge = site.status ? 
                (site.status === 'ok' ? '<span class="status-badge status-ok">可用</span>' : 
                 site.status === 'warn' ? '<span class="status-badge status-warn">存疑</span>' : 
                 '<span class="status-badge status-err">不可达</span>') : '';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="delete-btn" onclick="deleteSite(${idx})" ${isAdmin?'style="display:flex"':''}>×</button>
                <div class="card-top">
                    <div class="card-icon">${initial}</div>
                    <div class="card-info">
                        <a href="${site.url}" target="_blank" class="card-title">${site.name} ${statusBadge}</a>
                        <div class="card-desc">${site.desc || '暂无描述'}</div>
                        ${currentCategory==="全部" && site.category!=="置顶" ? `<span class="card-tag">${site.category}</span>` : ''}
                    </div>
                </div>
                <a href="${site.url}" target="_blank" class="btn-visit">立即访问 →</a>
            `;
            grid.appendChild(card);
        });
    }

    function filterSites() { renderSites(document.getElementById('searchInput').value); }

    // === 管理逻辑 ===
    function showLogin() { isAdmin ? toggleAdminMode() : (document.getElementById('loginModal').style.display='flex'); }
    function closeLogin() { document.getElementById('loginModal').style.display='none'; document.getElementById('adminPassword').value=''; }
    function checkPassword() {
        if(document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
            isAdmin = true; closeLogin();
            document.getElementById('adminPanel').style.display='block';
            renderTabs(); renderSites();
        } else alert("密码错误");
    }
    function toggleAdminMode() {
        const p = document.getElementById('adminPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
        if(p.style.display==='none') { isAdmin=false; renderSites(); }
    }
    function deleteSite(i) { if(confirm("确定删除?")) { sites.splice(i,1); saveSites(); } }

    // === 核心检测逻辑 ===
    
    // 判断是否为内网/IP
    function isInternal(url) {
        try {
            const hostname = new URL(url).hostname;
            if(hostname === 'localhost' || hostname === '127.0.0.1') return true;
            // IPv4 简单正则
            const ipRegex = /^(10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.|0\.0\.0\.0)/;
            if(ipRegex.test(hostname)) return true;
            return false;
        } catch(e) { return false; }
    }

    // 检测单个网站
    async function checkSiteHealth(url, providedName, providedDesc) {
        const result = { name: providedName, desc: providedDesc, status: 'ok', url: url };

        // 1. 内网/IP 直接跳过检测
        if(isInternal(url)) {
            console.log(`跳过内网检测: ${url}`);
            if(!result.name) result.name = "内网服务";
            if(!result.desc) result.desc = "本地或内网链接，已自动添加";
            return result;
        }

        // 2. 外网检测：使用 allorigins 代理获取 HTML
        try {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            if(!data.contents) throw new Error("No content");

            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, "text/html");
            
            // 获取 Title
            const title = doc.querySelector('title');
            if(title && title.textContent.trim() && !providedName) {
                result.name = title.textContent.trim();
            } else if (!providedName) {
                result.name = new URL(url).hostname;
            }

            // 获取 Description
            const metaDesc = doc.querySelector('meta[name="description"]');
            if(metaDesc && metaDesc.content.trim() && !providedDesc) {
                result.desc = metaDesc.content.trim();
            } else if (!providedDesc) {
                result.desc = "自动添加的外网链接";
            }

            result.status = 'ok';
        } catch (error) {
            console.warn(`检测失败 ${url}:`, error);
            result.status = 'warn'; // 标记为存疑，但保留
            if(!providedName) result.name = new URL(url).hostname;
            if(!providedDesc) result.desc = "无法自动获取描述 (可能网络受限或跨域拦截)，已保留链接";
        }
        return result;
    }

    // 手动添加带检测
    async function addSiteWithCheck() {
        const nameIn = document.getElementById('newName').value.trim();
        const urlIn = document.getElementById('newUrl').value.trim();
        const descIn = document.getElementById('newDesc').value.trim();
        const catIn = document.getElementById('newCategory').value;
        const btn = document.getElementById('addBtn');
        const btnText = document.getElementById('addBtnText');

        if(!urlIn) { alert("请输入网址"); return; }
        let finalUrl = urlIn.startsWith('http') ? urlIn : 'https://' + urlIn;

        if(sites.some(s => s.url === finalUrl)) { alert("已存在"); return; }

        // UI Loading
        const originalText = btnText.innerText;
        btnText.innerText = "检测中...";
        btn.disabled = true;

        const siteData = await checkSiteHealth(finalUrl, nameIn, descIn);
        
        sites.unshift({ ...siteData, category: catIn });
        saveSites();

        // Reset Form
        document.getElementById('newName').value = '';
        document.getElementById('newUrl').value = '';
        document.getElementById('newDesc').value = '';
        
        btnText.innerText = originalText;
        btn.disabled = false;

        if(siteData.status === 'warn') {
            alert(`添加成功，但检测到该链接可能不可达或获取信息失败。\n名称：${siteData.name}\n状态：存疑 (已保留)`);
        } else {
            // alert("添加成功!"); // 静默成功体验更好
        }
    }

    // 批量导入带检测
    async function handleFileSelect(input) {
        const file = input.files[0];
        if(!file) return;

        const logBox = document.getElementById('importLog');
        const importBtn = document.getElementById('importBtn');
        logBox.style.display = 'block';
        logBox.innerHTML = '<div class="log-item"><span class="spinner"></span> 开始解析文件...</div>';
        importBtn.disabled = true;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(e.target.result, "text/html");
            const dtElements = doc.querySelectorAll('dt');
            
            let currentFolder = "未分类";
            let count = 0;
            let skip = 0;
            let processed = 0;
            const total = dtElements.length; // 粗略估计

            logBox.innerHTML = `<div class="log-item">📂 发现约 ${total} 个条目，开始逐个检测...</div>`;

            // 为了不阻塞 UI，分批次处理或使用 async/await 循环
            // 注意：频繁请求公共代理可能会触发限流，这里加一点延迟
            for(let dt of dtElements) {
                const h3 = dt.querySelector('h3');
                const a = dt.querySelector('a');

                if(h3) {
                    let fName = h3.textContent.trim() || "未分类";
                    fName = fName.replace(/[<>"/]/g, '');
                    currentFolder = ["置顶","Top","Star"].includes(fName) ? "置顶" : fName;
                    continue;
                }

                if(a) {
                    const url = a.getAttribute('href');
                    const name = a.textContent.trim();
                    if(!url || url.startsWith('#')) continue;
                    if(sites.some(s => s.url === url)) { skip++; continue; }

                    processed++;
                    logBox.innerHTML += `<div class="log-item">⏳ 检测 (${processed}): ${name || url}...</div>`;
                    logBox.scrollTop = logBox.scrollHeight;

                    // 执行检测
                    const siteData = await checkSiteHealth(url, name, "");
                    
                    sites.unshift({ ...siteData, category: currentFolder });
                    count++;

                    // 更新日志状态
                    const lastLog = logBox.lastElementChild;
                    if(siteData.status === 'ok') {
                        lastLog.innerHTML = `✅ <b>${siteData.name}</b> - 可用`;
                        lastLog.style.color = '#166534';
                    } else {
                        lastLog.innerHTML = `⚠️ <b>${siteData.name}</b> - 存疑/不可达 (已保留)`;
                        lastLog.style.color = '#92400e';
                    }
                    
                    // 每处理 5 个保存一次，防止崩溃
                    if(count % 5 === 0) saveSites();
                    
                    // 简单的防限流延迟 (200ms)
                    await new Promise(r => setTimeout(r, 200));
                }
            }

            saveSites();
            logBox.innerHTML += `<div class="log-item" style="margin-top:10px; font-weight:bold; border-top:1px solid #ccc; padding-top:5px;">
                🎉 完成! 导入 ${count} 个新网址，跳过 ${skip} 个重复项。
            </div>`;
            importBtn.disabled = false;
            renderTabs();
            renderSites();
            input.value = '';
        };
        reader.readAsText(file);
    }
